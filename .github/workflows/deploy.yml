name: Deploy to VPS

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            
            if [ "${{ github.ref_name }}" = "staging" ]; then
              APP_DIR="/opt/apps/academy-staging"
              BACKUP_BASE="/opt/backups/academy-staging"
            elif [ "${{ github.ref_name }}" = "main" ]; then
              APP_DIR="/opt/apps/academy-prod"
              BACKUP_BASE="/opt/backups/academy-prod"
            fi
            
            BACKUP_DIR="$BACKUP_BASE/$TIMESTAMP"
            
            echo "📦 Creating backup: $BACKUP_DIR"
            mkdir -p $BACKUP_DIR
            cp -r $APP_DIR/* $BACKUP_DIR/
            
            echo "🧹 Cleaning old backups (keep last 3)"
            (cd "$BACKUP_BASE" && ls -1dt ./*/ | tail -n +4 | xargs -r rm -rf)
            
            echo "🚀 Deploying new version"
            cd $APP_DIR
            git pull origin ${{ github.ref_name }}
            docker compose down
            docker compose up -d --build
            
            echo "✅ Deployment complete"
